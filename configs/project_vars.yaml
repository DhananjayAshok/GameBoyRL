random_seed: 42
results_dir: "results" # Path to the directory where results will be saved, meant for lightweight files, plots and logs
WANDB_PROJECT: "GameBoyWorlds" # This is more for bash than for within python. Will set the wandb logger to the right project
ocr_max_new_tokens: 20
executor_vlm_model: gpt-4o # The VLM that handles simple goal directed usage of High Level Actions. 
executor_vlm_kind: openai
ocr_vlm_model: gpt-4o # The VLM that handles OCR. 
ocr_vlm_kind: openai
executor_action_buffer_size: 5
executor_retries_per_action: 3
executor_max_steps: 15
text_embedding_model: Qwen/Qwen3-Embedding-0.6B
text_embedding_model_kind: qwen3
text_embedding_model_max_length: 512
image_embedding_model: random_patch
image_embedding_model_kind: random_patch